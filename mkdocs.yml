site_name: FastHTTP
site_description: Fast and simple HTTP client library with async support and beautiful logging
site_author: White NEFOR
site_url: https://fasthttp.readthedocs.io/

docs_dir: docs

repo_url: https://github.com/ndugram/fasthttp
repo_name: ndugram/fasthttp

copyright: |
  Copyright &copy; 2026 White NEFOR  
  Built with Material for MkDocs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ndugram/fasthttp

nav:
  - Home: index.md
  - English:
    - Quick Start: en/quick-start.md
    - CLI: en/cli.md
    - Configuration: en/configuration.md
    - Examples: en/examples.md
    - Dependencies: en/dependencies.md
    - Security: en/security.md
    - Middleware: en/middleware.md
    - Pydantic: en/pydantic-validation.md
    - HTTP/2: en/http2-support.md
    - API Reference: en/api-reference.md
  - Русский:
    - Главная: ru/index.md
    - Быстрый старт: ru/quick-start.md
    - CLI: ru/cli.md
    - Конфигурация: ru/configuration.md
    - Примеры: ru/examples.md
    - Зависимости: ru/dependencies.md
    - Безопасность: ru/security.md
    - Мидлвар: ru/middleware.md
    - Pydantic: ru/pydantic-validation.md
    - HTTP/2: ru/http2-support.md
    - API: ru/api-reference.md
  - Blog:
    - English: blog/how-i-created-fasthttp.md
    - Русский: blog/istoriya-sozdaniya-fasthttp.md

theme:
  name: material
  language: en
  logo: logo-repo.png
  favicon: logo-repo.png

  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search