site_name: FastHTTP
site_description: Fast and simple HTTP client library with async support and beautiful logging
site_author: White NEFOR
site_url: https://fasthttp.readthedocs.io/

docs_dir: docs

repo_url: https://github.com/ndugram/fasthttp
repo_name: ndugram/fasthttp

copyright: |
  Copyright &copy; 2026 White NEFOR

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ndugram/fasthttp

  alternate:
    - link: /
      name: English
    - link: /ru/
      name: Russian

nav:
  - Home: index.md
  - English:
    - Quick Start: en/quick-start.md
    - CLI: en/cli.md
    - Configuration: en/configuration.md
    - Examples: en/examples.md
    - Dependencies: en/dependencies.md
    - Security: en/security.md
    - Middleware: en/middleware.md
    - GraphQL: en/graphql.md
    - Pydantic: en/pydantic-validation.md
    - HTTP/2: en/http2-support.md
    - OpenAPI: en/openapi.md
    - API Reference: en/api-reference.md
  - Russian:
    - Main: ru/index.md
    - Quick Start: ru/quick-start.md
    - CLI: ru/cli.md
    - Configuration: ru/configuration.md
    - Examples: ru/examples.md
    - Dependencies: ru/dependencies.md
    - Security: ru/security.md
    - Middleware: ru/middleware.md
    - GraphQL: ru/graphql.md
    - Pydantic: ru/pydantic-validation.md
    - HTTP/2: ru/http2-support.md
    - OpenAPI: ru/openapi.md
    - API Reference: ru/api-reference.md
  - Blog:
    - English: blog/how-i-created-fasthttp.md
    - Russian: blog/istoriya-sozdaniya-fasthttp.md

theme:
  name: material
  language: en
  logo: logo.png
  favicon: logo.png

  icon:
    repo: fontawesome/brands/github

  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.hover
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
