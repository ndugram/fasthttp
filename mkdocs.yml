site_name: FastHTTP
site_description: Fast and simple HTTP client library with async support and beautiful logging
site_author: White NEFOR
site_url: https://fasthttp.readthedocs.io/

docs_dir: docs

repo_url: https://github.com/ndugram/fasthttp
repo_name: ndugram/fasthttp

copyright: Copyright &copy; 2026 White NEFOR

# Logo
extra: {}

# Navigation
nav:
  - Home: index.md
  - English:
    - Quick Start: en/quick-start.md
    - CLI: en/cli.md
    - Configuration: en/configuration.md
    - Examples: en/examples.md
    - Dependencies: en/dependencies.md
    - Middleware: en/middleware.md
    - Pydantic: en/pydantic-validation.md
    - HTTP/2: en/http2-support.md
    - API Reference: en/api-reference.md
  - Русский:
    - Главная: ru/index.md
    - Быстрый старт: ru/quick-start.md
    - CLI: ru/cli.md
    - Конфигурация: ru/configuration.md
    - Примеры: ru/examples.md
    - Зависимости: ru/dependencies.md
    - Мидлвар: ru/middleware.md
    - Pydantic: ru/pydantic-validation.md
    - HTTP/2: ru/http2-support.md
    - API: ru/api-reference.md

theme:
  name: material
  language: en
  logo: logo-repo.png
  favicon: logo-repo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - search.suggest
    - search.highlight
    - navigation.top
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

plugins:
  - search
