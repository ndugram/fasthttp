version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3.11"
  jobs:
    post_create_environment:
      - python -m pip install --upgrade pip
    post_install:
      - python -m pip install --upgrade pip
      - python -m pip install mkdocs-material==9.5.18
      - python -m pip install -e .
    build:
      python:
        run: |
          python -m mkdocs build -d $READTHEDOCS_OUTPUT/html

mkdocs:
  configuration: mkdocs.yml