name: Release & Publish

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # ── 1. Bump version, commit [skip ci], output new version + sha ─────────────
  prepare:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          CUR=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          IFS='.' read -r major minor patch <<< "$CUR"
          NEW="${major}.${minor}.$((patch + 1))"

          sed -i "s/^version = \"${CUR}\"/version = \"${NEW}\"/" pyproject.toml
          sed -i "s/__version__ = \"${CUR}\"/__version__ = \"${NEW}\"/" fasthttp/__meta__.py

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped $CUR → $NEW"

      - name: Commit and push [skip ci]
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml fasthttp/__meta__.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # ── 2a. Linux wheels (manylinux, x86_64 + aarch64) ──────────────────────────
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          manifest-path: fasthttp/_core/Cargo.toml
          args: >-
            --release
            --out dist
            --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── 2b. macOS wheels (Apple Silicon) ─────────────────────────────────────────
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13

      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manifest-path: fasthttp/_core/Cargo.toml
          args: >-
            --release
            --out dist
            --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  # ── 2c. Windows wheels (x86_64) ──────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12

      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manifest-path: fasthttp/_core/Cargo.toml
          args: >-
            --release
            --out dist
            --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  # ── 2d. Source distribution ──────────────────────────────────────────────────
  build-sdist:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          manifest-path: fasthttp/_core/Cargo.toml
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── 3. Publish to PyPI + tag + GitHub Release + Telegram ────────────────────
  publish:
    needs: [prepare, build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

      - name: Create tag via GitHub API
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"${{ needs.prepare.outputs.sha }}\"}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.GH_TOKEN }}

      - name: Telegram — released
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          MESSAGE="🚀 *fasthttp-client ${TAG} released*

          ⚡ Async HTTP client with middleware, routing & OpenAPI support

          👤 ${{ github.actor }} · 🕐 ${{ github.event.head_commit.timestamp }}"

          KEYBOARD='{"inline_keyboard":[[{"text":"📦 PyPI","url":"https://pypi.org/project/fasthttp-client/"},{"text":"📖 Docs","url":"https://fasthttp.ndugram.dev"},{"text":"💻 GitHub","url":"https://github.com/'${GITHUB_REPOSITORY}'/releases/tag/'${TAG}'"}]]}'

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD}"

      - name: Email — released
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: "fasthttp CI <${{ secrets.EMAIL_USERNAME }}>"
          subject: "🚀 fasthttp-client v${{ needs.prepare.outputs.version }} released"
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="utf-8">
              <style>
                body { margin: 0; padding: 0; background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
                .wrap { max-width: 560px; margin: 40px auto; background: #161b22; border-radius: 12px; overflow: hidden; border: 1px solid #30363d; }
                .hero { background: linear-gradient(135deg, #238636 0%, #1a7f37 100%); padding: 32px 32px 24px; }
                .hero h1 { margin: 0; color: #fff; font-size: 24px; font-weight: 700; }
                .hero .tag { display: inline-block; margin-top: 8px; background: rgba(255,255,255,.15); color: #fff; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 600; }
                .body { padding: 28px 32px; }
                .desc { color: #8b949e; font-size: 14px; line-height: 1.6; margin: 0 0 24px; }
                .meta { display: flex; gap: 24px; margin-bottom: 28px; }
                .meta-item { flex: 1; }
                .meta-item .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
                .meta-item .value { color: #e6edf3; font-size: 14px; font-weight: 600; }
                .btns { display: flex; gap: 10px; }
                .btn { flex: 1; display: block; text-align: center; padding: 10px 0; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; }
                .btn-primary { background: #238636; color: #fff; }
                .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
                .footer { padding: 16px 32px; border-top: 1px solid #21262d; color: #8b949e; font-size: 12px; text-align: center; }
              </style>
            </head>
            <body>
              <div class="wrap">
                <div class="hero">
                  <h1>fasthttp-client</h1>
                  <span class="tag">v${{ needs.prepare.outputs.version }}</span>
                </div>
                <div class="body">
                  <p class="desc">New version successfully built, published to PyPI and tagged on GitHub.</p>
                  <div class="meta">
                    <div class="meta-item">
                      <div class="label">Released by</div>
                      <div class="value">@${{ github.actor }}</div>
                    </div>
                    <div class="meta-item">
                      <div class="label">Timestamp</div>
                      <div class="value">${{ github.event.head_commit.timestamp }}</div>
                    </div>
                    <div class="meta-item">
                      <div class="label">Commit</div>
                      <div class="value">${{ needs.prepare.outputs.sha && needs.prepare.outputs.sha || github.sha }}</div>
                    </div>
                  </div>
                  <div class="btns">
                    <a class="btn btn-primary" href="https://pypi.org/project/fasthttp-client/">📦 PyPI</a>
                    <a class="btn btn-secondary" href="https://github.com/${{ github.repository }}/releases/tag/v${{ needs.prepare.outputs.version }}">💻 Release</a>
                    <a class="btn btn-secondary" href="https://fasthttp.ndugram.dev">📖 Docs</a>
                  </div>
                </div>
                <div class="footer">fasthttp-client · GitHub Actions · ${{ github.repository }}</div>
              </div>
            </body>
            </html>
