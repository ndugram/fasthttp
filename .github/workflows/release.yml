name: Release & Publish

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # ── 1. Bump version, commit [skip ci], output new version + sha ─────────────
  prepare:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          CUR=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          IFS='.' read -r major minor patch <<< "$CUR"
          NEW="${major}.${minor}.$((patch + 1))"

          sed -i "s/^version = \"${CUR}\"/version = \"${NEW}\"/" pyproject.toml
          sed -i "s/__version__ = \"${CUR}\"/__version__ = \"${NEW}\"/" fasthttp/__meta__.py

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped $CUR → $NEW"

      - name: Commit and push [skip ci]
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml fasthttp/__meta__.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # ── 2a. Linux wheels (manylinux, x86_64 + aarch64) ──────────────────────────
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          manifest-path: fasthttp/_core/Cargo.toml
          args: >-
            --release
            --out dist
            --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── 2b. macOS wheels (Apple Silicon) ─────────────────────────────────────────
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13

      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manifest-path: fasthttp/_core/Cargo.toml
          args: >-
            --release
            --out dist
            --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  # ── 2c. Windows wheels (x86_64) ──────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12

      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manifest-path: fasthttp/_core/Cargo.toml
          args: >-
            --release
            --out dist
            --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  # ── 2d. Source distribution ──────────────────────────────────────────────────
  build-sdist:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          manifest-path: fasthttp/_core/Cargo.toml
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── 3. Publish to PyPI + tag + GitHub Release + Telegram ────────────────────
  publish:
    needs: [prepare, build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

      - name: Create tag via GitHub API
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"${{ needs.prepare.outputs.sha }}\"}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.GH_TOKEN }}

      - name: Telegram — released
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          MESSAGE="🚀 *fasthttp-client ${TAG} released*

          ⚡ Async HTTP client with middleware, routing & OpenAPI support

          👤 ${{ github.actor }} · 🕐 ${{ github.event.head_commit.timestamp }}"

          KEYBOARD='{"inline_keyboard":[[{"text":"📦 PyPI","url":"https://pypi.org/project/fasthttp-client/"},{"text":"📖 Docs","url":"https://fasthttp.ndugram.dev"},{"text":"💻 GitHub","url":"https://github.com/'${GITHUB_REPOSITORY}'/releases/tag/'${TAG}'"}]]}'

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "reply_markup=${KEYBOARD}"
