name: All Contributors

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  all-contributors:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.comment.body, '@all-contributors please') ||
      contains(github.event.comment.body, '@all-contributors-bot please')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add contributors
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const match = comment.match(/@all-contributors(?:[-_]bot)?\s+please\s+add\s+@(\S+)\s+for\s+(\S+)/i);
            
            if (match) {
              const username = match[1];
              const contributions = match[2].split(',').map(c => c.trim());
              
              const { data: existing } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.all-contributorsrc'
              });
              
              const config = JSON.parse(Buffer.from(existing.content, 'base64').toString());
              
              const existingContributor = config.contributors.find(c => c.login === username);
              if (existingContributor) {
                existingContributor.contributions = [...new Set([...existingContributor.contributions, ...contributions])];
              } else {
                config.contributors.push({
                  login: username,
                  contributions: contributions
                });
              }
              
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.all-contributorsrc',
                message: `docs: add ${username} as a contributor`,
                content: Buffer.from(JSON.stringify(config, null, 2)).toString('base64'),
                sha: existing.sha
              });
              
              console.log(`Added ${username} with contributions: ${contributions.join(', ')}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
