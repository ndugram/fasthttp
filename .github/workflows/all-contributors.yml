name: All Contributors

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  all-contributors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: sinchang/all-contributors-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
