name: CodSpeed Benchmark

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-codspeed aiohttp

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          run: pytest tests/test_performance.py --codspeed
