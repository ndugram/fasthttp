changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📝 Documentation
      labels:
        - docs
    - title: ✅ Tests
      labels:
        - tests
    - title: 🔧 Internal
      labels:
        - ci
        - config
        - code
        - refactor
        - dependencies
