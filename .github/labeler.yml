# Labeler configuration
# https://github.com/actions/labeler

# Branch-name based labels (take priority — set intent explicitly)
feature:
  - head-branch: ['^feat/', '^feature/']

enhancement:
  - head-branch: ['^enhance/', '^improvement/']

bug:
  - head-branch: ['^fix/', '^bug/', '^hotfix/']

refactor:
  - head-branch: ['^refactor/', '^chore/']


docs:
  - changed-files:
      - all-globs-to-all-files:
          - 'docs/**'
          - '*.md'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/*.yml'

config:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'setup.py'
          - 'setup.cfg'
          - '.ruff*'
          - '.editorconfig'
          - '.pre-commit-config.yaml'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'uv.lock'
