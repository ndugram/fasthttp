name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature request! Please fill out this template to help us understand and implement it.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature
      placeholder: "Describe the feature you'd like to see..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Solved
      description: |
        What problem does this feature solve? Why is it needed?
        Explain the pain point or limitation this addresses.
      placeholder: "This feature would solve..."

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        How do you think this should be implemented?
        Describe your ideal approach or provide pseudocode.
      placeholder: "I suggest implementing this by..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: |
        Any alternative solutions you've considered?
        What are the trade-offs?
      placeholder: "I've considered..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Any other context, mockups, or examples about the feature request.
        Links to related issues or discussions are welcome.
      placeholder: "Additional context here..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for similar feature requests
        - label: This is a new feature, not a variation of existing feature
